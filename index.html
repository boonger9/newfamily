<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>대구우리교회 새가족교육</title>
<style>
  /* ── 글자 크기: --fs 한 곳만 바꾸면 전체가 함께 커짐(전세대 대응) ── */
  :root{
    --fs: 18px;                /* 기본 18px (가/가+/가++ 토글로 변경) */
    --navy:#1F3864; --blue:#2E5395; --gray:#5b5b5b; --line:#e3e7ee;
    --ok:#2e7d32; --bg:#f6f8fb; --card:#fff; --accent:#fbf0e0;
    --hh:56px;                 /* 헤더 높이 */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"맑은 고딕","Malgun Gothic",-apple-system,system-ui,sans-serif;
    font-size:var(--fs); line-height:1.75; color:#1d2330; background:var(--bg);
    -webkit-text-size-adjust:100%;
  }
  /* ── 상단 헤더: 스크롤 내리면 숨고 올리면 나타남(본문 가림 방지) ── */
  header{
    position:fixed; top:0; left:0; right:0; height:var(--hh); z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; background:var(--navy); color:#fff;
    transition:transform .25s ease; padding-top:env(safe-area-inset-top);
  }
  header.hide{ transform:translateY(-100%); }
  header .title{ font-size:1rem; font-weight:700; }
  header .tools{ display:flex; gap:6px; align-items:center; }
  header button{ background:rgba(255,255,255,.16); color:#fff; border:0; border-radius:8px;
    padding:8px 10px; font-size:.85rem; cursor:pointer; }
  /* 본문: 헤더 높이만큼 띄우고, 앵커 이동 시에도 헤더에 안 가리게 scroll 보정 */
  main{ max-width:760px; margin:0 auto; padding:16px 16px 80px; }
  html{ scroll-padding-top:calc(var(--hh) + 10px); }
  body.focus header{ transform:translateY(-100%); }     /* 집중모드: 헤더 숨김 */
  body.focus #focusExit{ display:flex; }
  #focusExit{ display:none; position:fixed; right:14px; bottom:18px; z-index:60;
    background:var(--navy); color:#fff; border:0; border-radius:24px; padding:12px 16px;
    font-size:.9rem; box-shadow:0 4px 14px rgba(0,0,0,.2); cursor:pointer; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px; margin:14px 0; }
  h1{ font-size:1.5rem; color:var(--navy); margin:.2em 0 .4em; }
  h2{ font-size:1.18rem; color:var(--blue); margin:1em 0 .4em; }
  .muted{ color:var(--gray); }
  .pill{ display:inline-block; background:#eef3fb; color:var(--navy);
    border-radius:999px; padding:3px 12px; font-size:.85rem; font-weight:700; }
  /* 버튼: 터치영역 넉넉히(48px+) */
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:6px;
    min-height:50px; padding:0 20px; border-radius:12px; border:0; cursor:pointer;
    font-size:1rem; font-weight:700; background:var(--blue); color:#fff; }
  .btn.sec{ background:#eef1f6; color:var(--navy); }
  .btn.full{ width:100%; }
  .btn:disabled{ opacity:.5; cursor:default; }
  input,textarea{ width:100%; font-size:1rem; font-family:inherit; color:#1d2330;
    border:1.5px solid #cfd6e2; border-radius:10px; padding:12px; background:#fff; }
  textarea{ min-height:96px; resize:vertical; line-height:1.7; }
  label{ display:block; font-weight:700; margin:14px 0 6px; }

  .verse{ background:#eef3fb; border-left:6px solid #9db7e0; border-radius:8px;
    padding:12px 14px; margin:10px 0; }
  .one{ background:var(--accent); border-left:6px solid #e0a93c; border-radius:8px;
    padding:14px; font-weight:700; color:var(--navy); }
  .save{ font-size:.82rem; color:var(--ok); height:1.2em; }
  .save.dim{ color:var(--gray); }

  /* 주차 목록 */
  .weeklist{ display:flex; flex-direction:column; gap:10px; }
  .weekrow{ display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--line);
    border-radius:12px; background:#fff; cursor:pointer; }
  .weekrow .num{ width:40px; height:40px; border-radius:10px; background:#eef3fb; color:var(--navy);
    font-weight:800; display:flex; align-items:center; justify-content:center; }
  .weekrow.done{ background:#f1f8f1; border-color:#cfe6cf; }
  .weekrow .chk{ margin-left:auto; font-weight:800; color:var(--ok); }
  .progress{ height:12px; background:#e7ecf4; border-radius:8px; overflow:hidden; margin:6px 0; }
  .progress > i{ display:block; height:100%; background:var(--blue); width:0; transition:width .3s; }

  /* 메시지 */
  .msg{ padding:10px 12px; border-radius:12px; margin:8px 0; max-width:85%; }
  .msg.me{ background:#e9f0fb; margin-left:auto; }
  .msg.pa{ background:#fbf0e0; }
  .msg small{ display:block; color:var(--gray); font-size:.78rem; margin-top:4px; }

  /* 목사 명단 */
  .ltable{ width:100%; border-collapse:collapse; }
  .ltable td,.ltable th{ border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:middle; }
  .codechip{ font-family:monospace; background:#f1f1f4; padding:3px 8px; border-radius:6px; }

  .demo{ background:#fff7e6; border:1px solid #ffd98a; color:#8a5a00; border-radius:10px;
    padding:10px 12px; font-size:.88rem; margin:12px 0; }
  .tabs{ display:flex; gap:8px; margin:14px 0; }
  .tabs button{ flex:1; min-height:48px; border:1.5px solid #cfd6e2; background:#fff; color:var(--navy);
    border-radius:10px; font-weight:700; cursor:pointer; }
  .tabs button.on{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .hint{ font-size:.85rem; color:var(--gray); margin-top:6px; }
  .row2{ display:flex; gap:10px; flex-wrap:wrap; }
  .row2 > *{ flex:1; min-width:140px; }

  /* 학습 화면 보강 */
  .lead{ background:#f2f4f8; border-left:6px solid #9aa6bd; border-radius:8px; padding:13px 15px; margin:10px 0; color:#333; }
  .rdh{ font-weight:800; color:var(--blue); margin:18px 0 6px; font-size:1.05rem; }
  .rdp{ margin:0 0 12px; }
  .vnote{ color:var(--gray); font-size:.92rem; margin-top:4px; }
  .hintline{ color:var(--gray); font-size:.92rem; font-style:italic; margin:2px 0 6px; }
  .box{ border-radius:10px; padding:14px 16px; margin:14px 0; border-left:6px solid; }
  .box h4{ margin:0 0 8px; font-size:1rem; }
  .box.sum{ background:#eaf2ea; border-color:#6fa873; }
  .box.apply{ background:#fbf0e0; border-color:#e0a93c; }
  .box.mem{ background:#eae6f2; border-color:#7e6cb0; }
  .box.pray{ background:#f2f4f8; border-color:#9aa6bd; font-style:italic; }
  .box ul{ margin:6px 0 0; padding-left:20px; }
  .box li{ margin:4px 0; }
  /* 인도자 노트 */
  .ln{ border-radius:10px; padding:13px 15px; margin:10px 0; border-left:6px solid; }
  .ln h4{ margin:0 0 7px; font-size:.98rem; }
  .ln.core{ background:#fcefd6; border-color:#e0a93c; font-weight:700; color:var(--navy); }
  .ln.ice{ background:#e9f3ec; border-color:#5ba06b; }
  .ln.note{ background:#fdf3e3; border-color:#e0a93c; }
  .ln.tip{ background:#eae6f2; border-color:#7e6cb0; }
  .ln.qa{ background:#f2f4f8; border-color:#9aa6bd; }
  .ln ul{ margin:0; padding-left:20px; } .ln li{ margin:5px 0; }
  .ln .q{ font-weight:700; color:#9C3B47; margin-top:8px; }
  .ln .a{ margin:2px 0 0; }
</style>

<script type="module">
/* ───────────────────────── 1) 백엔드 추상화 ─────────────────────────
   demo  : 브라우저 localStorage (Firebase 미설정 시)
   live  : Firebase Firestore + Auth (config 입력 시)
   둘 다 동일한 인터페이스(getLearner/saveLearner/listLearners/...)를 제공해
   화면 코드는 어느 모드인지 신경 쓸 필요가 없습니다. */
const LIVE = !!(firebaseConfig && firebaseConfig.apiKey);
let fx = null; // firestore helpers (live 모드에서 채워짐)
let MODE = LIVE ? "live" : "demo";

async function initBackend(){
  if(!LIVE) return;
  try{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, signInAnonymously, signInWithEmailAndPassword, signOut } =
      await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, getDocs, addDoc, query, orderBy, serverTimestamp } =
      await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); const db = getFirestore(app);
    fx = { auth, db, signInAnonymously, signInWithEmailAndPassword, signOut,
      doc, getDoc, setDoc, updateDoc, deleteDoc, collection, getDocs, addDoc, query, orderBy, serverTimestamp };
  }catch(e){
    console.error(e); MODE="demo"; // 로드 실패 시 안전하게 데모로
    alert("온라인 연결에 문제가 있어 임시(데모) 모드로 표시합니다.");
  }
}

// ── 데모 저장소(localStorage) ──
const LS = {
  read:(k,d)=>{ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch{ return d; } },
  write:(k,v)=> localStorage.setItem(k, JSON.stringify(v)),
};

const DB = {
  async pastorLogin(email, pw){
    if(MODE==="demo"){ return email && pw ? {email} : null; }
    const cred = await fx.signInWithEmailAndPassword(fx.auth, email, pw);
    return { email: cred.user.email };
  },
  async learnerAuth(){ // 학습자: live 모드에서 익명 로그인
    if(MODE==="live" && !fx.auth.currentUser){ await fx.signInAnonymously(fx.auth); }
  },
  async getLearner(code){
    if(MODE==="demo") return LS.read("nf_learner_"+code, null);
    const snap = await fx.getDoc(fx.doc(fx.db,"learners",code));
    return snap.exists() ? snap.data() : null;
  },
  async saveLearner(code, data){ // 자기 문서에만 병합 저장(동시 접속 간섭 없음)
    data.updatedAt = Date.now();
    if(MODE==="demo"){ LS.write("nf_learner_"+code, data); return; }
    await fx.setDoc(fx.doc(fx.db,"learners",code), data, { merge:true });
  },
  async createLearner(code, data){
    if(MODE==="demo"){
      LS.write("nf_learner_"+code, data);
      const idx = LS.read("nf_index", []); if(!idx.includes(code)){ idx.push(code); LS.write("nf_index", idx); }
      return;
    }
    await fx.setDoc(fx.doc(fx.db,"learners",code), data);
  },
  async listLearners(){ // 목사 전용
    if(MODE==="demo"){
      return LS.read("nf_index", []).map(c => ({ code:c, ...(LS.read("nf_learner_"+c, {})) }));
    }
    const qs = await fx.getDocs(fx.collection(fx.db,"learners"));
    return qs.docs.map(d => ({ code:d.id, ...d.data() }));
  },
  async addMessage(code, msg){
    msg.at = Date.now();
    if(MODE==="demo"){ const k="nf_msgs_"+code; const a=LS.read(k,[]); a.push(msg); LS.write(k,a); return; }
    await fx.addDoc(fx.collection(fx.db,"learners",code,"messages"), msg);
  },
  async listMessages(code){
    if(MODE==="demo") return LS.read("nf_msgs_"+code, []);
    const qs = await fx.getDocs(fx.query(fx.collection(fx.db,"learners",code,"messages"), fx.orderBy("at")));
    return qs.docs.map(d => d.data());
  },

  // ── 기도제목 나눔(공유) ──
  async listPrayers(){
    if(MODE==="demo") return LS.read("nf_prayers", []);
    const qs = await fx.getDocs(fx.query(fx.collection(fx.db,"prayers"), fx.orderBy("at","desc")));
    return qs.docs.map(d => ({ id:d.id, ...d.data() }));
  },
  async addPrayer(pr){
    pr.at = Date.now(); pr.prayedBy = 0;
    if(MODE==="demo"){ const a=LS.read("nf_prayers",[]); pr.id="p"+pr.at; a.unshift(pr); LS.write("nf_prayers",a); return; }
    await fx.addDoc(fx.collection(fx.db,"prayers"), pr);
  },
  async prayFor(id){
    if(MODE==="demo"){ const a=LS.read("nf_prayers",[]); const p=a.find(x=>x.id===id); if(p){ p.prayedBy=(p.prayedBy||0)+1; LS.write("nf_prayers",a); } return; }
    const ref=fx.doc(fx.db,"prayers",id); const s=await fx.getDoc(ref);
    await fx.updateDoc(ref, { prayedBy:(s.data().prayedBy||0)+1 });
  },
  async deletePrayer(id){
    if(MODE==="demo"){ LS.write("nf_prayers", LS.read("nf_prayers",[]).filter(x=>x.id!==id)); return; }
    await fx.deleteDoc(fx.doc(fx.db,"prayers",id));
  },

  // ── 질문과 답변(Q&A) ──
  async listQna(){
    if(MODE==="demo") return LS.read("nf_qna", []);
    const qs = await fx.getDocs(fx.query(fx.collection(fx.db,"qna"), fx.orderBy("at","desc")));
    return qs.docs.map(d => ({ id:d.id, ...d.data() }));
  },
  async addQna(q){
    q.at = Date.now(); q.answer = "";
    if(MODE==="demo"){ const a=LS.read("nf_qna",[]); q.id="q"+q.at; a.unshift(q); LS.write("nf_qna",a); return; }
    await fx.addDoc(fx.collection(fx.db,"qna"), q);
  },
  async answerQna(id, answer){
    if(MODE==="demo"){ const a=LS.read("nf_qna",[]); const q=a.find(x=>x.id===id); if(q){ q.answer=answer; q.answeredAt=Date.now(); LS.write("nf_qna",a); } return; }
    await fx.updateDoc(fx.doc(fx.db,"qna",id), { answer, answeredAt:Date.now() });
  },
  async deleteQna(id){
    if(MODE==="demo"){ LS.write("nf_qna", LS.read("nf_qna",[]).filter(x=>x.id!==id)); return; }
    await fx.deleteDoc(fx.doc(fx.db,"qna",id));
  },
};

      {q:"등을 돌린 사람을 끝까지 찾아오시는 하나님 — 지금 어떤 마음이 드나요?"},
    ],
    summary:["우리는 잠깐의 행복으로 채워지지 않는, 영원을 향한 갈망을 품고 있습니다.","참 행복은 우리를 지으신 하나님의 사랑 안에 있습니다.","그 관계는 죄로 깨졌지만, 하나님은 예수님을 통해 회복의 길을 여셨습니다."],
    apply:"이번 한 주, 하루 한 번 “하나님, 저를 사랑하신다면 그 사랑을 알게 해 주세요”라고 짧게 말해 보세요.",
    vRefMem:"요한복음 3:16", vTextMem:"하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니…",
    pray:"하나님, 제 안에 채워지지 않는 갈망이 있습니다. 그것이 당신을 향한 것이라면 저를 찾아와 주세요. 이 시간을 인도해 주세요.",
    leader:{
      core:"출발점은 죄책감이 아니라 ‘행복을 향한 갈망’이다. 율법이 아니라 사랑으로 문을 연다.",
      ice:["한 사람씩 ‘최근 가장 행복했던 순간’을 한 문장으로(인도자 먼저 시범).","이어 ‘그 행복이 얼마나 오래갔나요?’만 묻고, 답을 평가 말고 받아준다.","말수 적은 게 정상 — 침묵을 5초쯤 기다려 준다."],
      note:["첫날 ‘회개하라/믿으라’로 몰지 않는다(5주에 다룸). 오늘은 ‘초청’의 분위기.","죄를 도덕적 비난으로 들리게 하면 마음이 닫힌다 → ‘내가 주인 되려는 것’으로 부드럽게.","안 믿어져도 괜찮다는 안전감을 말로 표현해 준다.","한 사람이 독점하면 ‘옆에 분은 어떠세요?’로 자연스럽게 넘긴다."],
      tip:["비유: 행복은 ‘나비’ — 잡으려 하면 달아난다.","예화: 아기 방을 먼저 꾸미는 부모처럼, 하나님은 사람 짓기 전 환경을 다 준비하셨다.","강조: 우리가 올라간 게 아니라 하나님이 내려오셨다(요 3:16)."],
      qa:[{q:"착하게 살면 되지 왜 꼭 예수님인가요?",a:"착함은 귀하지만 깨어진 ‘관계’를 회복시키진 못합니다. 빚진 사람이 더 착해진다고 빚이 사라지지 않듯, 끊어진 관계는 누군가 찾아와 회복시켜야 합니다. 그 일을 예수님이 하셨습니다."},{q:"고통이 많은데 사랑의 하나님이 계신가요?",a:"성경은 고통을 외면하지 않고 그 뿌리를 ‘관계의 깨어짐’으로 봅니다. 하나님은 그 고통 속으로 직접 들어오셨습니다(십자가). 오늘은 그 질문을 품고 가셔도 좋다고 격려."}],
    } },
  { w:2, title:"예수님은 누구신가?", subt:"참 사람, 그리고 참 하나님",
    intro:"사람들은 예수님을 ‘위대한 스승·착한 사람’ 등으로 말합니다. 그러나 예수님 자신과 그분을 직접 만난 사람들은 전혀 다른 고백을 했습니다. 오늘은 예수님이 정말 누구신지 살펴봅니다.",
    one:"예수님은 나를 아시는 ‘참 사람’이자, 나를 구원하시는 ‘참 하나님’이십니다.",
    read:[
      {h:"이름에 담긴 사명"},
      {p:"‘예수’는 ‘구원하시는 분’이라는 뜻입니다(마태복음 1:21). 이름이 곧 그분이 오신 목적을 말해 줍니다. 예수님은 막연한 가르침이 아니라, 하나님과 멀어진 우리를 ‘구원하러’ 오셨습니다."},
      {h:"예수님은 참 사람이셨다"},
      {p:"예수님은 주리셨고(마 4:2), 지쳐 우물가에 앉으셨으며(요 4:6), 주무셨고(막 4:38), 친구의 무덤 앞에서 우셨습니다(요 11:35). 배고픔·피곤·슬픔을 ‘아시는’ 분입니다. 단 한 가지 다른 점은, 똑같이 시험받으셨으나 죄가 없으셨다는 것입니다(히 4:15). 그래서 우리 약함을 멀리서 판단하지 않으시고 가까이서 도우십니다."},
      {h:"예수님은 참 하나님이셨다"},
      {p:"동시에 예수님은 “나와 아버지는 하나이니라”(요 10:30) 하시며 자신을 하나님과 동등한 분으로 밝히셨습니다. 베드로는 ‘하나님의 아들’이라 고백했고(마 16:16), 백부장은 ‘진실로 하나님의 아들’이라 했으며(마 27:54), 도마는 ‘나의 주, 나의 하나님’이라 엎드렸습니다(요 20:28)."},
      {h:"왜 둘 다여야 했을까"},
      {p:"사람으로 오셔야 우리를 ‘대신’할 수 있고, 하나님이셔야 그 일을 ‘완전하게·영원히’ 이루실 수 있었습니다. 죽음마저 이기실 분은 하나님뿐이기 때문입니다(행 2:24). 그래서 예수님은 우리의 유일한 구원자이십니다."},
    ],
    verses:[
      {ref:"히브리서 4:15", text:"우리의 연약함을 동정하지 못하실 이가 아니요 모든 일에 우리와 똑같이 시험을 받으신 이로되 죄는 없으시니라", note:"예수님은 내 연약함을 ‘아시고’ 함께하십니다."},
      {ref:"요한복음 10:30", text:"나와 아버지는 하나이니라", note:"예수님은 스스로 하나님과 동등한 분으로 밝히셨습니다."},
    ],
    q:[
      {q:"지금 당신은 예수님을 어떤 분이라고 생각하나요?", hint:"지금 생각을 적어 두면 6주 뒤와 비교할 수 있습니다."},
      {q:"‘우리와 똑같이 시험받으신’ 예수님이, 당신의 어떤 연약함을 아실 것 같나요?", hint:"외로움·피곤·슬픔… 예수님이 직접 겪으신 것을 떠올려 보세요."},
    ],
    summary:["‘예수’는 ‘구원하시는 분’이라는 뜻입니다.","예수님은 우리와 똑같이 사셨지만 죄가 없으신 참 사람입니다.","동시에 죽음을 이기시는 참 하나님, 우리의 유일한 구원자이십니다."],
    apply:"이번 주, 힘들거나 외로운 순간에 “예수님은 이 마음을 아신다”고 떠올려 보세요.",
    vRefMem:"요한복음 10:30", vTextMem:"나와 아버지는 하나이니라",
    pray:"예수님, 당신이 제 약함을 아시고 함께하시는 분임을 믿게 해 주세요.",
    leader:{
      core:"예수님은 ‘위대한 스승’이 아니라 ‘참 사람이자 참 하나님’이시다. 둘 다여야 우리를 구원하신다.",
      ice:["‘유명인의 소문 vs 진짜 모습’ 이야기로 ‘예수님도 소문과 실제가 다르다’ 다리 놓기.","지난주 암송(요 3:16) 함께 외워보고 한 주 어땠는지 한 마디씩."],
      note:["인성만 강조하면 ‘좋은 위인’, 신성만 강조하면 ‘먼 신’으로 기운다 → 반드시 함께.","삼위일체 용어를 깊이 파지 않는다(5주에 부드럽게).","‘죄 없으심’을 도덕적 완벽으로만 말하면 거리감 → ‘그래서 우리를 대신하신다’로 연결."],
      tip:["강조: 예수님이 우셨다(요 11:35) — ‘하나님이 우신다’는 다른 종교엔 없는 위로.","비유: 같은 병을 앓아본 의사가 더 신뢰되듯, 예수님은 우리 약함을 ‘겪어 아시는’ 분.","증인 3인(베드로·백부장·도마)을 ‘서로 다른 처지가 같은 고백에 이르렀다’로 묶기."],
      qa:[{q:"예수님이 하나님이라는 증거가 있나요?",a:"본인의 선언(요 10:30), 죄 사함의 권세, 그리고 결정적으로 부활(4주)입니다. 겁먹던 제자들이 목숨 건 증인으로 바뀌었습니다."},{q:"다른 종교의 성인과 뭐가 다른가요?",a:"다른 분들은 ‘길을 가리킨’ 스승입니다. 예수님은 ‘내가 곧 길’이라 하셨고, 우리를 대신해 죽고 다시 사셨습니다. 정보가 아니라 구원입니다."}],
    } },
  { w:3, title:"무엇을 하셨는가? — 십자가", subt:"위대한 교환",
    intro:"기독교의 상징은 십자가입니다. 그런데 십자가는 원래 가장 잔인한 사형 도구였습니다. 왜 교회는 처형 도구를 사랑의 상징으로 삼을까요? 오늘 그 답을 찾습니다.",
    one:"예수님은 십자가에서 ‘내 죄’를 대신 지셨습니다 — 이것이 위대한 교환입니다.",
    read:[
      {h:"실제로 일어난 죽음"},
      {p:"예수님의 십자가 죽음은 신화가 아니라 역사 속 사건입니다. 빌라도의 재판을 받으시고, 채찍질 후 십자가에 못 박히셨습니다(막 15:15,25). 당시 십자가형은 가장 고통스럽고 수치스러운 처형이었습니다."},
      {h:"왜 ‘죽음’이어야 했나"},
      {p:"하나님은 공의로우셔서 죄를 못 본 척 넘기실 수 없습니다. 죄의 값은 오직 생명으로만 치를 수 있습니다 — “피흘림이 없은즉 사함이 없느니라”(히 9:22). 우리 스스로 치를 수 없기에, 예수님이 자기 생명으로 대신 치르셨습니다(‘세상 죄를 지고 가는 어린 양’, 요 1:29)."},
      {h:"왜 하필 ‘십자가’였나"},
      {p:"가장 수치스러운 십자가였던 데에도 뜻이 있습니다. 우리 죄가 그만큼 심각하다는 것과, 그 모든 형벌·저주를 예수님이 ‘대신’ 받으셨다는 것을 보여 줍니다(갈 3:13). 우리가 받을 심판을 그분이 받으셨습니다."},
      {h:"위대한 교환, 그리고 자유"},
      {p:"십자가에서 ‘맞바꿈’이 일어났습니다. 예수님이 내 죄를 가져가시고 그분의 의를 내게 주셨습니다(고후 5:21). 그래서 십자가는 ‘더 갚으라’는 빚 독촉이 아니라 ‘이미 다 치러졌으니 안심하라’는 선언입니다. 우리는 사랑을 얻어내려 애쓰는 자가 아니라, 이미 값없이 사랑받은 자로 살아갑니다."},
    ],
    verses:[
      {ref:"갈라디아서 3:13", text:"그리스도께서 우리를 위하여 저주를 받은 바 되사 율법의 저주에서 우리를 속량하셨으니", note:"내가 받을 심판을 예수님이 대신 받으셨습니다."},
      {ref:"고린도후서 5:21", text:"하나님이 죄를 알지도 못하신 이를 우리를 대신하여 죄로 삼으신 것은 우리로 하여금 그 안에서 하나님의 의가 되게 하려 하심이라", note:"그분이 내 죄를, 나는 그분의 의를 — 위대한 교환."},
    ],
    q:[
      {q:"내 죄를 대신 지신 그 사랑 앞에서, 지금 어떤 마음이 드나요?", hint:"미안함·놀라움·부담·감사… 어떤 것이든 솔직하게."},
      {q:"십자가가 ‘이미 청산된 빚’이라면, 당신의 삶에서 무엇이 달라질까요?", hint:"‘인정받으려 애쓰는 마음’이 어떻게 바뀔지 생각해 보세요."},
    ],
    summary:["예수님의 십자가는 역사 속 실제 사건입니다.","죄의 값은 생명으로만 치를 수 있어, 예수님이 대신 치르셨습니다.","그분이 내 죄를, 나는 그분의 의를 받는 ‘위대한 교환’이 일어났습니다."],
    apply:"이번 주, 자책하게 될 때 “그 값은 이미 십자가에서 치러졌다”고 떠올려 보세요.",
    vRefMem:"갈라디아서 3:13", vTextMem:"그리스도께서 우리를 위하여 저주를 받은 바 되사 …속량하셨으니",
    pray:"예수님, 제 죄를 대신 지신 사랑을 깊이 깨닫게 해 주세요. 갚으려 애쓰기보다 받은 사랑을 누리게 해 주세요.",
    leader:{
      core:"십자가는 ‘더 갚으라’가 아니라 ‘다 치러졌으니 안식하라’는 선언이다 — 반율법주의의 심장.",
      ice:["‘누군가 내 잘못을 대신 책임져 준 경험’을 한 명만 나눠도 좋다.","그 고마움/미안함을 십자가로 자연스럽게 잇는다."],
      note:["가장 큰 함정: 십자가 뒤 ‘그러니 더 열심히 살자’로 끝내는 것 — 복음을 율법으로 되돌린다.","잔혹한 묘사에 치우치지 않는다. 고통의 ‘양’보다 대신 받으심의 ‘의미’에.","‘위대한 교환’ 한 문장(내 죄↔그분의 의)은 또렷이 남긴다."],
      tip:["비유: 판사가 직접 내려와 내 벌금을 내고, 자기 무죄 기록까지 내 이름으로 줬다.","예화: ‘완납’ 도장 — 요 19:30 ‘다 이루었다’가 그 도장.","강조: 차머스 ‘새 애정의 추방하는 힘’ — 사랑받았기에 산다."],
      qa:[{q:"왜 그냥 용서하지 않고 꼭 누가 죽어야 하나요?",a:"참 사랑은 불의를 눈감지 않습니다. 죄를 ‘없던 일’로 하면 정의가 무너집니다. 그래서 용서의 값을 ‘하나님 자신’이 치르셨습니다 — 사랑과 공의가 동시에 만족된 십자가입니다."},{q:"이미 다 용서됐다면 죄지어도 되나요?",a:"빚을 갚아준 은인 앞에서 더 막살고 싶진 않지요. 받은 사랑이 클수록 합당하게 살고 싶어집니다 — 벌이 두려워서가 아니라 사랑에 감격해서(6주로 연결)."}],
    } },
  { w:4, title:"지금 무엇을 하시는가? — 부활", subt:"부활과 다스림",
    intro:"십자가에서 모든 게 끝났다면 기독교는 한 선한 사람의 비극으로 끝났을 것입니다. 그러나 사흘 만에 놀라운 일—부활이 일어났습니다. 오늘은 부활이 ‘지금 내 삶’과 무슨 상관인지 봅니다.",
    one:"예수님은 지금도 살아 계셔서, 내 삶을 다스리시고 함께하십니다.",
    read:[
      {h:"부활은 꾸며낸 이야기가 아니다"},
      {p:"부활하신 예수님은 제자들과 한 번에 오백여 명이 넘는 사람에게 나타나셨고(고전 15:6), 그 대부분이 살아 있을 때 이 기록이 쓰였습니다. 부활이 거짓이라면 십자가의 대속도 헛것이 됩니다. 그러나 부활은 사실이며, 그래서 예수님이 구원자이심이 확증됩니다."},
      {h:"부활하신 주님의 약속"},
      {p:"부활하신 예수님은 “하늘과 땅의 모든 권세를 내게 주셨으니… 세상 끝날까지 너희와 함께 있으리라”(마 28:18,20) 하셨습니다. 이천 년 전 제자에게만이 아니라 오늘 우리에게 주신 약속입니다. 우리는 결코 혼자가 아닙니다."},
      {h:"예수님은 지금 무엇을 하시나"},
      {p:"지금 예수님은 온 세상 역사를 다스리시고, 교회의 머리로 우리를 돌보십니다(엡 1:20-23). 우리가 겪는 어려움도 ‘예수님 밖’이 아니라 그분의 다스림 ‘안에서’ 겪는 일입니다. 그분은 우리 사정을 다 아시고, 아시기에 도우십니다."},
      {h:"빼앗기지 않는 행복"},
      {p:"1주에 말한 ‘잠깐의 행복’과 달리, 부활하신 예수님이 주시는 행복은 세상 무엇도 빼앗을 수 없습니다. “환난이나 곤고나… 그 어떤 것도 우리를 그리스도 안에 있는 하나님의 사랑에서 끊을 수 없으리라”(롬 8:35,39). 이것이 우리가 찾던 ‘영원한 행복’의 실체입니다."},
    ],
    verses:[
      {ref:"마태복음 28:20", text:"볼지어다 내가 세상 끝날까지 너희와 항상 함께 있으리라", note:"부활하신 주님은 지금도 나와 함께하십니다."},
      {ref:"로마서 8:38-39", text:"내가 확신하노니 …다른 어떤 피조물이라도 우리를 그리스도 예수 안에 있는 하나님의 사랑에서 끊을 수 없으리라", note:"이 사랑은 무엇으로도 빼앗기지 않습니다."},
    ],
    q:[
      {q:"부활하신 예수님이 ‘지금’ 내 상황을 다스리신다면, 이번 주 무엇이 달라질까요?", hint:"지금 가장 염려되는 일 하나에 이 사실을 얹어 보세요."},
      {q:"‘빼앗기지 않는 행복’은 1주의 ‘잠깐의 행복’과 무엇이 다른가요?"},
    ],
    summary:["부활은 수많은 목격자가 증언한 역사적 사실입니다.","부활하신 예수님은 지금 세상과 나를 다스리며 함께하십니다.","그래서 우리는 무엇으로도 빼앗기지 않는 행복을 누립니다."],
    apply:"이번 주, 염려가 밀려올 때 “이 일도 살아 계신 주님의 손 안에 있다”고 기도해 보세요.",
    vRefMem:"로마서 4:25", vTextMem:"예수는 …우리를 의롭다 하시기 위하여 살아나셨느니라",
    pray:"살아 계신 예수님, 제 삶의 모든 일이 당신의 다스림 안에 있음을 믿습니다. 오늘의 염려를 맡깁니다.",
    leader:{
      core:"부활은 과거의 기적이 아니라 ‘오늘 살아 계셔 다스리심’이다 — 그래서 빼앗기지 않는 행복이 가능하다.",
      ice:["‘요즘 가장 마음 쓰이는 염려’를 한 단어로만 나눈다(사정 캐묻지 않기).","그 단어들을 적어 두었다가 강의 끝에서 ‘모두 주님의 손 안에 있다’로 묶어 준다."],
      note:["부활을 ‘착하면 천국’식 도덕적 보상으로 환원하지 않는다.","증거를 변증 논쟁으로 끌고 가 분위기를 차게 만들지 않는다 — 핵심만 짚고 위로로.","고난 중인 분께는 섣부른 위로보다 ‘함께하심’을 전한다."],
      tip:["강조: 겁먹어 숨던 제자들이 목숨 건 증인으로 — 거짓 위해 목숨 걸 사람은 없다.","비유: 폭풍 속에도 선장이 살아 키를 잡고 있으면 승객은 안심한다.","수미상관: 1주 ‘잠깐의 행복’ ↔ 오늘 ‘빼앗기지 않는 행복’을 나란히 적어 대비."],
      qa:[{q:"믿는데도 왜 여전히 힘든 일이 생기나요?",a:"부활은 ‘고난 면제권’이 아니라 ‘고난 속 동행’의 약속입니다. 폭풍을 즉시 없애기보다 한가운데서 함께 키를 잡으십니다 — 상황이 같아도 무게가 달라집니다."},{q:"부활이 과학적으로 가능한가요?",a:"세상을 지으신 분이라면 죽음을 되돌리실 수 있습니다. 핵심 쟁점은 ‘가능성’보다 ‘목격 증언의 신뢰성’입니다."}],
    } },
  { w:5, title:"나는 이제 누구인가?", subt:"회개와 믿음 · 구원의 확신 · 자녀 정체성",
    intro:"지난 4주 동안 예수님이 누구신지, 무엇을 하셨는지 들었습니다. 이제 나는 어떻게 반응해야 할까요? 그리고 이 복음을 받아들인 나는 누구일까요?",
    one:"나는 용서받은 죄인을 넘어, 하나님의 ‘사랑받는 자녀’입니다.",
    read:[
      {h:"복음에 대한 반응 — 회개와 믿음"},
      {p:"회개는 죄 목록을 떠올리며 자책하는 게 아니라, 내가 앉아 있던 ‘왕좌’에서 내려와 그 자리를 예수님께 드리는 것입니다. 믿음은 그분이 하신 일을 신뢰하며 나를 온전히 맡기는 것입니다. 이 둘은 동전의 양면처럼 함께 갑니다."},
      {h:"의롭다 인정받은 나"},
      {p:"하나님이 나를 받으시는 근거는 ‘나의 행위’가 아닙니다. ‘위대한 교환’ 덕분에 나는 내 성적표가 아니라 그리스도의 의로움 위에 서 있습니다(롬 5:1). 그래서 내 신분은 기분이나 성공에 따라 흔들리지 않습니다."},
      {h:"하나님의 자녀가 된 나"},
      {p:"복음의 가장 깊은 선물은, 내가 ‘용서받은 죄인’에 머물지 않고 ‘하나님의 자녀’로 받아들여지는 것입니다(요 1:12). 성령께서 ‘아빠 아버지’라 부르게 하시고 내가 자녀임을 증언하십니다(롬 8:15-16). 내 정체성은 무엇을 해냈느냐가 아니라 하나님이 나를 어떻게 사랑하시느냐가 먼저 정합니다."},
      {h:"확신이 흔들릴 때 붙들 세 가지"},
      {p:"확신을 ‘오늘의 기분’ 위에 세우면 늘 흔들립니다. 세 ‘사실’ 위에 세우십시오 — ① 말씀의 약속(요일 5:13), ② 그리스도의 완성된 사역(히 10:14, ‘단번에 영원히 온전하게 하셨다’), ③ 성령의 증거(롬 8:16). 흔들릴 때는 더 ‘느끼려’ 애쓰지 말고 이 약속들을 바라보십시오."},
    ],
    verses:[
      {ref:"요한복음 1:12", text:"영접하는 자 곧 그 이름을 믿는 자들에게는 하나님의 자녀가 되는 권세를 주셨으니", note:"예수님을 영접한 나는 하나님의 자녀입니다."},
      {ref:"로마서 8:16", text:"성령이 친히 우리의 영과 더불어 우리가 하나님의 자녀인 것을 증언하시나니", note:"성령께서 내가 자녀임을 확증하십니다."},
    ],
    q:[
      {q:"‘나는 하나님의 사랑받는 자녀다’라는 말, 지금 어디까지 받아들여지나요?", hint:"100%가 아니어도 괜찮습니다. 지금 그대로의 마음을."},
      {q:"확신이 흔들릴 때, 무엇(느낌? 약속?)에 기대고 싶은가요?"},
    ],
    summary:["복음의 반응은 회개(주권을 드림)와 믿음(나를 맡김)입니다.","나는 내 행위가 아니라 그리스도의 의로 의롭다 인정받았습니다.","나는 하나님의 사랑받는 자녀이며, 확신은 느낌이 아니라 약속 위에 섭니다."],
    apply:"이번 주, 하루를 시작할 때 “나는 하나님의 사랑받는 자녀다”라고 한 번 소리 내어 말해 보세요.",
    vRefMem:"요한복음 1:12", vTextMem:"영접하는 자 …에게는 하나님의 자녀가 되는 권세를 주셨으니",
    pray:"하나님 아버지, 제가 제 삶의 주인으로 살아온 것을 인정합니다. 예수님을 저의 구원자와 주인으로 영접합니다. 저를 자녀로 받아 주심을 믿고 감사합니다. 예수님의 이름으로 기도합니다. 아멘.",
    confession:true,
    leader:{
      core:"반응은 회개와 믿음, 결과는 ‘사랑받는 자녀’ 정체성. 확신은 느낌이 아니라 약속 위에 선다.",
      ice:["‘운전대를 남에게 넘기기 어려운 순간’을 떠올리게 해 ‘회개=주권 이양’의 다리.","지난 4주 중 가장 마음에 남은 한 가지를 한 마디씩."],
      note:["오늘은 결단을 ‘초청’할 수 있는 회차지만, 분위기로 몰지 않는다 — 속도는 사람마다.","결단 안 한 사람이 소외감 느끼지 않게 한다.","확신을 ‘느낌’으로 몰면 평생 흔들린다 → ‘약속·사역·성령’ 세 근거로.","신앙고백을 강제로 적게 하지 않는다 — 앱의 비공개 기능 안내, ‘준비된 만큼’만."],
      tip:["동작: 의자에 앉았다 일어나 그 자리를 ‘예수님께 드리는’ 장면을 실제로 보여주면 강하게 남는다.","예화: 입양된 아이 — 한 일이 있어서가 아니라 ‘받아들여졌기에’ 자녀가 된다(나우웬 ‘사랑받는 자’).","강조: 순서를 뒤집기 — ‘행함→인정’이 아니라 ‘사랑받음→행함’."],
      qa:[{q:"제가 정말 구원받았는지 확신이 안 서요.",a:"아주 정상입니다. 기분에서 찾으면 늘 흔들립니다. 말씀의 약속(요일 5:13), 그리스도의 완성된 사역(히 10:14), 성령의 증거(롬 8:16)를 보세요. 느낌은 따라옵니다."},{q:"믿고 나서 또 죄를 지으면요?",a:"자녀가 넘어진다고 부모가 내치지 않습니다. 회개하고 다시 갑니다. 칭의(신분)는 한 번에 확정되고, 성화(자라감)는 평생 진행됩니다(6주)."}],
    } },
  { w:6, title:"어떻게 살아갈 것인가?", subt:"은혜의 방편과 정착",
    intro:"새로 태어난 아기에게 양식·가족·돌봄이 필요하듯, 믿음의 새 생명도 그렇습니다. 마지막 시간은 이 새 생명을 어떻게 건강하게 자라게 할지 나눕니다.",
    one:"새 생명은 ‘혼자’가 아니라 ‘함께’, 매일의 작은 걸음으로 자랍니다.",
    read:[
      {h:"은혜의 방편 — 자라게 하는 통로들"},
      {p:"하나님은 우리를 자라게 하시려고 몇 가지 ‘통로(은혜의 방편)’를 주셨습니다. 이것들은 점수를 따는 ‘의무’가 아니라, 사랑하는 아버지와 함께 사는 자녀의 ‘자연스러운 일상’입니다."},
      {list:["예배 — 주일은 부활을 기념하는 날. 함께 하나님을 높이는 자리에 나아갑니다.","말씀 — 갓난아기가 젖을 사모하듯 매일 성경을 양식으로.","기도 — 멋진 말이 아니라 아버지와 나누는 솔직한 대화.","성례(세례·성찬) — 세례는 새 신분의 표, 성찬은 그리스도와의 교제.","공동체(구역) — 혼자 자라는 그리스도인은 없습니다. 서로의 짐을 함께.","섬김·전도 — 받은 사랑이 흘러넘치는 것. 의무가 아니라 감사."]},
      {h:"한 번에 다 하려 하지 마세요"},
      {p:"이 모든 걸 한꺼번에 하려 하면 지칩니다. 이번 주엔 그중 ‘하나’만 시작해 보십시오. 작은 한 걸음이 평생의 습관이 됩니다."},
      {h:"끝이 아니라 시작입니다"},
      {p:"이 6주 과정은 끝이 아니라 시작입니다. 다음 걸음은 ‘공동체(구역) 정착’과 ‘세례·학습으로 나아가는 것’입니다. 교회 가족이 당신을 환대하며 함께 걸어줄 것입니다. 당신은 이제 혼자가 아닙니다."},
    ],
    verses:[
      {ref:"사도행전 2:42", text:"그들이 사도의 가르침을 받아 서로 교제하고 떡을 떼며 오로지 기도하기를 힘쓰니라", note:"초대교회 성도들이 함께 자라간 모습입니다."},
    ],
    q:[
      {q:"여섯 가지 통로 중, 이번 주에 ‘하나’만 시작한다면 무엇을 택하시겠어요?", hint:"가장 만만한 것 하나면 충분합니다."},
      {q:"이 6주를 지나며, 처음과 지금 당신의 마음은 무엇이 달라졌나요?", hint:"2주에 적은 답과 비교해 보세요."},
    ],
    summary:["은혜의 방편은 의무가 아니라 자녀의 일상입니다.","한 번에 다 하지 말고, 이번 주 ‘하나’부터 시작합니다.","이 과정은 끝이 아니라, 공동체와 함께하는 평생 여정의 시작입니다."],
    apply:"이번 주, 여섯 가지 중 하나를 정해 ‘딱 한 번’ 실천하고, 교회의 한 사람에게 먼저 인사를 건네 보세요.",
    vRefMem:"사도행전 2:42", vTextMem:"…서로 교제하고 떡을 떼며 오로지 기도하기를 힘쓰니라",
    pray:"하나님, 6주 동안 인도해 주셔서 감사합니다. 이제 시작입니다. 매일 작은 걸음으로 동행하게 해 주시고, 함께 걸어갈 공동체를 허락해 주세요.",
    leader:{
      core:"성장의 방편은 ‘점수 따는 의무’가 아니라 ‘자녀의 일상’. 한 번에 다 말고 ‘하나’부터, 그리고 ‘함께’.",
      ice:["‘새 습관을 들여 본 경험(운동·일기)’을 나누며 신앙 습관으로 연결.","6주를 돌아보며 ‘가장 좋았던 한 가지’를 한 마디씩(수료 분위기)."],
      note:["여섯 가지를 ‘다 해야 한다’는 압박으로 주지 않는다 → ‘하나부터’.","‘끝’이 아니라 ‘시작’임을 분명히, 다음 모임/구역에 실제로 연결한다.","교회별 안내(예배시간·세례절차)를 구체적으로 준비해 둔다.","수료를 형식적으로 끝내지 말고 한 사람씩 환대의 말을 건넨다."],
      tip:["비유: 갓난아기에게 ‘오늘부터 뛰어라’ 하지 않는다 — ‘하나’부터.","예화: 혼자 타는 숯은 금방 꺼지지만 모이면 오래 탄다 — 공동체의 필요.","장치: 끝에 각자 ‘이번 주 시작할 하나’를 입으로 말하게 하면 실행률이 오른다."],

];

const app = document.getElementById("app");
let S = { role:null, code:null, learner:null, email:null }; // 현재 로그인 상태
const esc = s => (s??"").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const debounce = (fn,ms)=>{ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };
function randomCode(name){
  const base=(name||"새가족").trim().slice(0,6).replace(/\s/g,"");
  return base+"-"+Math.floor(1000+Math.random()*9000); // 추측 어려운 4자리
}

async function learnerEnter(){
  const code=document.getElementById("lcode").value.trim();
  if(!code){ alert("코드를 입력해 주세요."); return; }
  try{
    await DB.learnerAuth();
    let l = await DB.getLearner(code);
    if(!l){ alert("코드를 찾을 수 없어요. 인도자에게 확인해 주세요."); return; }
    S={ role:"learner", code, learner:l };
    document.getElementById("logoutBtn").style.display="";
    renderLearnerHome();
  }catch(e){ console.error(e); alert("입장 중 문제가 생겼어요. 잠시 후 다시 시도해 주세요."); }
}
async function pastorEnter(){
  const email=document.getElementById("pemail").value.trim();
  const pw=document.getElementById("ppw").value;
  try{
    const u = await DB.pastorLogin(email,pw);
    if(!u){ alert("이메일·비밀번호를 확인해 주세요."); return; }
    S={ role:"pastor", email:u.email };

    renderPastorHome();

}

function progressPct(l){
  const p = l.progress||{}; const done = CURRICULUM.filter(c=>p["w"+c.w]?.done).length;
  return Math.round(done/CURRICULUM.length*100);
}
function renderLearnerHome(){
  const l=S.learner, p=l.progress||{};
  const firstUndone = (CURRICULUM.find(c=>!p["w"+c.w]?.done)||CURRICULUM[0]).w;
  app.innerHTML = `
    <div class="card">
      <span class="pill">${esc(l.name||"새가족")} 님</span>
      <h1 style="margin-top:10px">나의 6주 여정</h1>
      <div class="progress"><i style="width:${progressPct(l)}%"></i></div>

      <button class="btn full" id="resume" style="margin-top:8px">${p["w"+firstUndone]?.done?"다시 보기":"이어서 하기"} (${firstUndone}주)</button>
    </div>
    <div class="weeklist">
      ${CURRICULUM.map(c=>{

      <button class="btn sec" id="goQna">💬 질문과 답변</button>
    </div>`;
  app.appendChild(nav);
  document.getElementById("goPray").onclick=()=>renderPrayers("learner");
  document.getElementById("goQna").onclick=()=>renderQna("learner");
}

function renderWeek(w){
  const c=CURRICULUM.find(x=>x.w===w);
  const l=S.learner, p=l.progress||{}, ans=l.answers||{};
  const wp = p["w"+w]||{};
  app.innerHTML = `
    <button class="btn sec" id="back" style="min-height:44px">‹ 목록</button>
    <div class="card">
      <span class="pill">${w}주</span>
      <h1 style="margin-top:8px">${esc(c.title)}</h1>
      ${c.subt?`<p class="muted" style="margin-top:-4px">${esc(c.subt)}</p>`:""}
      ${c.intro?`<div class="lead">${esc(c.intro)}</div>`:""}
      <div class="one">${esc(c.one)}</div>

      <h2>함께 읽어요</h2>
      ${c.read.map(r=>{
        if(r.h) return `<div class="rdh">${esc(r.h)}</div>`;
        if(r.p) return `<p class="rdp">${esc(r.p)}</p>`;
        if(r.list) return `<ul>${r.list.map(li=>`<li>${esc(li)}</li>`).join("")}</ul>`;
        return "";
      }).join("")}

      <h2>말씀으로 확인해요</h2>
      ${(c.verses||[]).map(v=>`<div class="verse"><b>${esc(v.ref)}</b><br>${esc(v.text)}${v.note?`<div class="vnote">→ ${esc(v.note)}</div>`:""}</div>`).join("")}

      <h2>생각하고 적어보세요</h2>
      ${c.q.map((item,i)=>`
        <label>${i+1}. ${esc(item.q)}</label>
        ${item.hint?`<div class="hintline">도움말 · ${esc(item.hint)}</div>`:""}
        <textarea data-k="w${w}_q${i+1}" placeholder="여기에 자유롭게 적어보세요">${esc(ans["w"+w+"_q"+(i+1)]||"")}</textarea>
      `).join("")}
      ${c.confession?`
        <label>나의 신앙고백 (비공개 — 인도자/목사만 봅니다)</label>
        <textarea data-k="confession" placeholder="마음이 준비되었다면 짧게 적어보세요">${esc(l.confession||"")}</textarea>`:""}
      <div class="save dim" id="savestate">자동 저장됩니다</div>

      ${c.summary?`<div class="box sum"><h4>핵심 정리</h4><ul>${c.summary.map(s=>`<li>${esc(s)}</li>`).join("")}</ul></div>`:""}
      ${c.apply?`<div class="box apply"><h4>이번 주 적용 한 가지</h4>${esc(c.apply)}</div>`:""}
      ${c.vRefMem?`<div class="box mem"><h4>이번 주 암송구절</h4><b>${esc(c.vRefMem)}</b> — ${esc(c.vTextMem||"")}</div>`:""}
      ${c.pray?`<div class="box pray"><h4>혼자 기도해보기</h4>${esc(c.pray)}</div>`:""}

      <button class="btn full" id="done" style="margin-top:8px">${wp.done?"완료 취소":"이 과를 마쳤어요 ✓"}</button>
    </div>
    <div class="card">
      <h2>인도자에게 1:1 (비공개)</h2>
      <div id="msgs" class="muted">불러오는 중…</div>
      <div class="row2" style="margin-top:8px">
        <textarea id="msgin" placeholder="질문이나 나누고 싶은 말을 적어주세요" style="min-height:60px"></textarea>
      </div>
      <button class="btn" id="msgsend" style="margin-top:8px">보내기</button>
    </div>`;
  window.scrollTo(0,0);
  document.getElementById("back").onclick=renderLearnerHome;

  // 자동 저장(0.8초 디바운스) — 자기 문서에만 저장 → 동시 접속 간섭 없음
  const setState=(t,dim)=>{ const s=document.getElementById("savestate"); s.textContent=t; s.classList.toggle("dim",!!dim); };
  const persist = debounce(async ()=>{
    try{
      l.answers=l.answers||{};
      app.querySelectorAll("textarea[data-k]").forEach(t=>{
        if(t.dataset.k==="confession") l.confession=t.value; else l.answers[t.dataset.k]=t.value;
      });
      await DB.saveLearner(S.code, { name:l.name, answers:l.answers, confession:l.confession||"", progress:l.progress||{} });
      setState("저장됨 ✓");
    }catch(e){ console.error(e); setState("저장 실패 — 잠시 후 자동 재시도", true); }
  }, 800);
  app.querySelectorAll("textarea[data-k]").forEach(t=>{
    t.addEventListener("input", ()=>{ setState("저장 중…", true); persist(); });
  });

  document.getElementById("done").onclick=async()=>{
    l.progress=l.progress||{}; l.progress["w"+w]={ done: !(l.progress["w"+w]?.done) };
    try{ await DB.saveLearner(S.code,{ progress:l.progress }); renderWeek(w); }
    catch(e){ console.error(e); alert("저장에 실패했어요. 다시 시도해 주세요."); }
  };

  loadThread(S.code, false);
  document.getElementById("msgsend").onclick=async()=>{
    const v=document.getElementById("msgin").value.trim(); if(!v) return;
    try{ await DB.addMessage(S.code,{ from:"learner", text:v }); document.getElementById("msgin").value=""; loadThread(S.code,false); }
    catch(e){ console.error(e); alert("전송 실패. 다시 시도해 주세요."); }
  };
}

async function loadThread(code, isPastor){

  try{

    box.innerHTML = list.length ? list.map(m=>`
      <div class="msg ${m.from==="pastor"?"pa":"me"}">${esc(m.text)}
        <small>${m.from==="pastor"?"인도자":"새가족"} · ${new Date(m.at).toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</small>
      </div>`).join("") : `<p class="muted">아직 대화가 없습니다. 먼저 인사를 건네보세요.</p>`;
  }catch(e){ console.error(e); box.innerHTML=`<p class="muted">대화를 불러오지 못했어요.</p>`; }
}

  loadThread(code,true);
  document.getElementById("msgsend").onclick=async()=>{
    const v=document.getElementById("msgin").value.trim(); if(!v) return;
    try{ await DB.addMessage(code,{ from:"pastor", text:v }); document.getElementById("msgin").value=""; loadThread(code,true); }
    catch(e){ console.error(e); alert("전송 실패."); }
  };
}

/* ── 기도제목 나눔(공유) ── */
async function renderPrayers(role){
  const back = ()=> role==="pastor" ? renderPastorHome() : renderLearnerHome();
  app.innerHTML=`
    <button class="btn sec" id="back" style="min-height:44px">‹ 뒤로</button>
    <div class="card">
      <h1>🙏 기도제목 나눔</h1>
      <p class="muted">함께 기도하면 힘이 됩니다. ‘🙏 기도할게요’로 마음을 전해요.</p>
      <textarea id="prtext" placeholder="나누고 싶은 기도제목을 적어주세요"></textarea>
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:8px">
        <input type="checkbox" id="pranon" style="width:auto"> 이름 없이(익명) 올리기</label>
      <button class="btn" id="prsend" style="margin-top:8px">기도제목 올리기</button>
    </div>
    <div id="prlist"><p class="muted">불러오는 중…</p></div>`;
  document.getElementById("back").onclick=back;
  async function refresh(){
    let list=[]; try{ list=await DB.listPrayers(); }catch(e){ console.error(e); }
    document.getElementById("prlist").innerHTML = list.length ? list.map(p=>`
      <div class="card">
        <p>${esc(p.text)}</p>
        <div class="row2" style="align-items:center">
          <small class="muted">${esc(p.name||"익명")} · ${new Date(p.at).toLocaleDateString("ko-KR")}</small>
          <div style="text-align:right">
            <button class="btn sec pray" data-id="${esc(p.id)}" style="min-height:40px;padding:0 12px">🙏 기도할게요 ${p.prayedBy||0}</button>
            ${role==="pastor"?`<button class="btn sec del" data-id="${esc(p.id)}" style="min-height:40px;padding:0 12px;background:#fdeeee;color:#c0504d">삭제</button>`:""}
          </div>
        </div>
      </div>`).join("") : `<p class="muted">아직 올라온 기도제목이 없습니다. 먼저 나눠보세요.</p>`;
    document.querySelectorAll(".pray").forEach(b=> b.onclick=async()=>{ try{ await DB.prayFor(b.dataset.id); refresh(); }catch(e){ console.error(e); } });
    document.querySelectorAll(".del").forEach(b=> b.onclick=async()=>{ if(confirm("삭제할까요?")){ try{ await DB.deletePrayer(b.dataset.id); refresh(); }catch(e){ console.error(e); } } });
  }
  document.getElementById("prsend").onclick=async()=>{
    const t=document.getElementById("prtext").value.trim(); if(!t) return;
    const anon=document.getElementById("pranon").checked;
    const name= anon ? "익명" : ((S.learner&&S.learner.name) || "인도자");
    try{ await DB.addPrayer({ name, text:t }); document.getElementById("prtext").value=""; refresh(); }
    catch(e){ console.error(e); alert("올리기에 실패했어요. 다시 시도해 주세요."); }
  };
  refresh();
}

/* ── 질문과 답변(Q&A) ── */
async function renderQna(role){
  const isP = role==="pastor";
  app.innerHTML=`
    <button class="btn sec" id="back" style="min-height:44px">‹ 뒤로</button>
    <div class="card">
      <h1>💬 질문과 답변</h1>
      <p class="muted">궁금한 점을 편하게 물어보세요. 인도자가 답해 드립니다.</p>
      ${!isP?`<textarea id="qtext" placeholder="질문을 적어주세요"></textarea>
      <button class="btn" id="qsend" style="margin-top:8px">질문 올리기</button>`:""}
    </div>
    <div id="qlist"><p class="muted">불러오는 중…</p></div>`;
  document.getElementById("back").onclick=()=> isP ? renderPastorHome() : renderLearnerHome();
  async function refresh(){
    let list=[]; try{ list=await DB.listQna(); }catch(e){ console.error(e); }
    document.getElementById("qlist").innerHTML = list.length ? list.map(q=>`
      <div class="card">
        <p><b>Q. ${esc(q.text)}</b></p>
        <small class="muted">${esc(q.name||"새가족")} · ${new Date(q.at).toLocaleDateString("ko-KR")}</small>
        ${q.answer?`<div class="verse" style="margin-top:8px"><b>A.</b> ${esc(q.answer)}</div>`
                  :`<p class="muted" style="margin-top:6px">아직 답변 대기 중이에요.</p>`}
        ${isP?`<div style="margin-top:8px">
          <textarea class="ans" data-id="${esc(q.id)}" placeholder="답변을 작성하세요">${esc(q.answer||"")}</textarea>
          <div class="row2" style="margin-top:6px">
            <button class="btn ansbtn" data-id="${esc(q.id)}" style="min-height:44px">답변 저장</button>
            <button class="btn sec qdel" data-id="${esc(q.id)}" style="min-height:44px;background:#fdeeee;color:#c0504d">삭제</button>
          </div></div>`:""}
      </div>`).join("") : `<p class="muted">아직 질문이 없습니다.</p>`;
    if(isP){
      document.querySelectorAll(".ansbtn").forEach(b=> b.onclick=async()=>{
        const ta=document.querySelector('.ans[data-id="'+b.dataset.id+'"]');
        try{ await DB.answerQna(b.dataset.id, ta.value.trim()); refresh(); }catch(e){ console.error(e); alert("저장 실패."); }
      });
      document.querySelectorAll(".qdel").forEach(b=> b.onclick=async()=>{ if(confirm("삭제할까요?")){ try{ await DB.deleteQna(b.dataset.id); refresh(); }catch(e){ console.error(e); } } });
    }
  }
  if(!isP) document.getElementById("qsend").onclick=async()=>{
    const t=document.getElementById("qtext").value.trim(); if(!t) return;
    try{ await DB.addQna({ name:(S.learner&&S.learner.name)||"새가족", text:t }); document.getElementById("qtext").value=""; refresh(); }
    catch(e){ console.error(e); alert("올리기에 실패했어요."); }
  };
  refresh();
}

/* ── 데모 시드(미리보기용 샘플 데이터) ── */
function seedDemo(){
  if(MODE!=="demo") return;
  if(LS.read("nf_index", null)) return; // 이미 데이터가 있으면 건너뜀
  const seed=[{code:"민수-4821",name:"민수"},{code:"영희-1903",name:"영희"},{code:"철수-7755",name:"철수"}];
  const idx=[];
  seed.forEach(s=>{ LS.write("nf_learner_"+s.code, { name:s.name, answers:{}, progress:{}, confession:"", createdAt:Date.now() }); idx.push(s.code); });
  LS.write("nf_index", idx);
  LS.write("nf_prayers", [
    { id:"p1", name:"영희", text:"새 직장에 잘 적응하도록 기도해 주세요.", at:Date.now()-86400000, prayedBy:2 },
    { id:"p2", name:"익명", text:"가족이 함께 교회에 나오게 되길 소망합니다.", at:Date.now()-3600000, prayedBy:1 },
  ]);
  LS.write("nf_qna", [
    { id:"q1", name:"민수", text:"구원의 확신이 잘 안 들 때는 어떻게 하나요?",
      answer:"느낌이 아니라 ‘약속’을 보세요. 5주의 세 근거(말씀·그리스도의 사역·성령의 증거)를 다시 떠올리면 큰 힘이 됩니다.",
      at:Date.now()-7200000, answeredAt:Date.now()-3600000 },
  ]);
}

/* ───────────────────────── 5) 헤더/글자크기/집중모드 ───────────────────────── */
(function uiControls(){
  // 글자 크기 토글
  const sizes=[18,21,24]; let si=+(localStorage.getItem("nf_fs")||0);
  const applyFs=()=>{ document.documentElement.style.setProperty("--fs", sizes[si]+"px");
    document.getElementById("fsBtn").textContent = si===0?"가＋":(si===1?"가＋＋":"가"); };
  applyFs();
  document.getElementById("fsBtn").onclick=()=>{ si=(si+1)%sizes.length; localStorage.setItem("nf_fs",si); applyFs(); };

  // 집중 읽기 모드(헤더 숨김)
  document.getElementById("focusBtn").onclick=()=> document.body.classList.add("focus");
  document.getElementById("focusExit").onclick=()=> document.body.classList.remove("focus");

  // 스크롤 내릴 때 헤더 자동 숨김(본문 가림 방지), 올리면 복귀
  let lastY=0; const hdr=document.querySelector("header");
  addEventListener("scroll",()=>{ if(document.body.classList.contains("focus")) return;
    const y=scrollY; if(y>lastY && y>80) hdr.classList.add("hide"); else hdr.classList.remove("hide"); lastY=y; },{passive:true});

  // 나가기
  document.getElementById("logoutBtn").onclick=async()=>{
    try{ if(MODE==="live" && fx?.auth?.currentUser) await fx.signOut(fx.auth); }catch{}
    S={ role:null }; document.body.classList.remove("focus"); renderLogin();
  };
})();

/* ───────────────────────── 6) 시작 ───────────────────────── */
(async()=>{ await initBackend(); seedDemo(); renderLogin(); })();
</script>
